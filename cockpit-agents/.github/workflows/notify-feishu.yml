name: Notify AIOS-Pets Feishu

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    name: Send push summary to AIOS-Pets
    runs-on: ubuntu-latest

    steps:
      - name: Send Feishu group notification
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_AIOS_PETS_CHAT_ID }}
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          HEAD_COMMIT_URL: ${{ github.event.head_commit.url }}
          HEAD_COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMPARE_URL: ${{ github.event.compare }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import textwrap
          import urllib.error
          import urllib.request

          app_id = os.environ.get("FEISHU_APP_ID", "").strip()
          app_secret = os.environ.get("FEISHU_APP_SECRET", "").strip()
          chat_id = os.environ.get("FEISHU_CHAT_ID", "").strip() or "oc_5e5cd2c549b5e4325ffcb4e0cbb5fcd1"
          if not app_id or not app_secret:
              print("FEISHU_APP_ID / FEISHU_APP_SECRET are not configured; skipping Feishu notification.")
              raise SystemExit(0)

          repository = os.environ["REPOSITORY"]
          ref_name = os.environ["REF_NAME"]
          ref_type = os.environ["REF_TYPE"]
          actor = os.environ["ACTOR"]
          sha = os.environ["SHA"]
          short_sha = sha[:7]
          commit_url = os.environ.get("HEAD_COMMIT_URL") or f"https://github.com/{repository}/commit/{sha}"
          compare_url = os.environ.get("COMPARE_URL") or commit_url
          run_url = os.environ["RUN_URL"]
          author = os.environ.get("HEAD_COMMIT_AUTHOR") or actor
          message = os.environ.get("HEAD_COMMIT_MESSAGE") or "Manual workflow dispatch"
          subject = message.splitlines()[0][:120]
          body = "\n".join(message.splitlines()[1:]).strip()
          if body:
              body = textwrap.shorten(body.replace("\n", " "), width=420, placeholder="…")
          else:
              body = "无详细提交说明。"

          title = f"AIOS-Pets GitHub 更新 · {short_sha}"
          post = {
              "zh_cn": {
                  "title": title,
                  "content": [
                      [
                          {"tag": "text", "text": "仓库："},
                          {"tag": "a", "text": repository, "href": f"https://github.com/{repository}"},
                      ],
                      [
                          {"tag": "text", "text": f"分支/引用：{ref_type} / {ref_name}"},
                      ],
                      [
                          {"tag": "text", "text": f"提交：{short_sha} · {subject}"},
                      ],
                      [
                          {"tag": "text", "text": f"作者：{author}；推送人：{actor}"},
                      ],
                      [
                          {"tag": "text", "text": f"说明：{body}"},
                      ],
                      [
                          {"tag": "a", "text": "查看提交", "href": commit_url},
                          {"tag": "text", "text": "  |  "},
                          {"tag": "a", "text": "查看变更范围", "href": compare_url},
                          {"tag": "text", "text": "  |  "},
                          {"tag": "a", "text": "查看 Actions", "href": run_url},
                      ],
                  ],
              }
          }

          def post_json(url, payload, headers=None):
              data = json.dumps(payload, ensure_ascii=False).encode("utf-8")
              request = urllib.request.Request(
                  url,
                  data=data,
                  headers={"Content-Type": "application/json; charset=utf-8", **(headers or {})},
                  method="POST",
              )
              with urllib.request.urlopen(request, timeout=12) as response:
                  raw = response.read().decode("utf-8", errors="replace")
                  return response.status, raw, json.loads(raw)

          token_payload = {"app_id": app_id, "app_secret": app_secret}
          _, _, token_response = post_json(
              "https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal",
              token_payload,
          )
          if token_response.get("code") != 0:
              raise RuntimeError(f"Failed to get tenant_access_token: {token_response}")
          token = token_response["tenant_access_token"]

          message_payload = {
              "receive_id": chat_id,
              "msg_type": "post",
              "content": json.dumps(post, ensure_ascii=False),
          }
          status, raw, send_response = post_json(
              "https://open.feishu.cn/open-apis/im/v1/messages?receive_id_type=chat_id",
              message_payload,
              headers={"Authorization": f"Bearer {token}"},
          )
          if send_response.get("code") != 0:
              raise RuntimeError(f"Feishu send failed: {send_response}")
          print(f"Feishu notification sent: HTTP {status}")
          print(raw)
          PY
